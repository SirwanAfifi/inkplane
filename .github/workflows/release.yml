name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  artifact-metadata: write
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test and build
        run: npm run check
      - name: Validate tag
        run: node scripts/check-release.mjs "$GITHUB_REF_NAME"
      # Keep each release asset in its own signed statement for verifiers that
      # validate a single subject at a time.
      - name: Attest main.js
        # Pin the action version Obsidian's release verifier currently accepts.
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: main.js
      - name: Attest manifest.json
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: manifest.json
      - name: Attest styles.css
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: styles.css
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          main.js manifest.json styles.css
          --verify-tag
          --title "Inkplane $GITHUB_REF_NAME"
          --generate-notes
